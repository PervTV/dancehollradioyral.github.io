<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHR | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: #181818; padding: 25px; border-radius: 12px; border: 1px solid #1db954; width: 100%; max-width: 700px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 30px; }
        h2 { color: #1db954; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input[type="password"] { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { width: 100%; height: 550px; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; box-sizing: border-box; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4; resize: vertical; margin-bottom: 15px; }
        button { background: #1db954; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 14px; }
        button:hover { background: #1ed760; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; }
        .hidden { display: none; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>🔒 Вход в управление</h2>
        <input type="password" id="pass-input" placeholder="Введите пароль">
        <button onclick="checkAuth()">Войти</button>
    </div>

    <div id="editor-box" class="card hidden">
        <h2>🎵 Music Chart Editor</h2>
        <textarea id="chart-content" placeholder="Загрузка данных из Supabase..."></textarea>
        <button id="save-btn" onclick="saveToDB()">ОПУБЛИКОВАТЬ НА САЙТЕ</button>
        <div id="status"></div>
    </div>

    <script>
        // Настройки базы
        const SB_URL = 'https://immwfduunwqqpkoszfeb.supabase.co';
        const SB_KEY = 'sb_publishable_IizaK7JwvJsaWv8x6qrLUg_OKWK7bqL';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // ПАРОЛЬ ПРЯМЫМ ТЕКСТОМ (БЕЗ ХЭША)
        const MY_PASS = "DanceHollRadioAdmin1234!";

        function checkAuth() {
            const inputVal = document.getElementById('pass-input').value.trim();

            if (inputVal === MY_PASS) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('editor-box').classList.remove('hidden');
                loadData();
            } else {
                alert("Пароль неверный! Убедись, что вводишь: DanceHollRadioAdmin1234!");
            }
        }

        // Enter для входа
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

        // Загрузка
        async function loadData() {
            const { data, error } = await _supabase
                .from('music_chart')
                .select('full_content')
                .eq('id', 1)
                .single();

            if (error) {
                alert("Ошибка загрузки: Проверь ID строки в базе.");
                return;
            }
            if (data) {
                document.getElementById('chart-content').value = data.full_content || "";
            }
        }

        // Сохранение
        async function saveToDB() {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status');
            const text = document.getElementById('chart-content').value;

            btn.disabled = true;
            status.innerText = "⏳ Сохраняю...";

            const { error } = await _supabase
                .from('music_chart')
                .update({ full_content: text })
                .eq('id', 1);

            btn.disabled = false;
            if (error) {
                status.style.color = "red";
                status.innerText = "❌ Ошибка: " + error.message;
            } else {
                status.style.color = "#1db954";
                status.innerText = "✅ ЧАРТ ОБНОВЛЕН!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }
        }
    </script>
</body>
</html>
