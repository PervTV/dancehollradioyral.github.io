<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Radio Control Panel</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #181818; padding: 25px; border-radius: 12px; border: 1px solid #1db954; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #1db954; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1db954; background: #2a2a2a; outline: none; }
        button { background: #1db954; color: #000; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #1ed760; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; }
        .hidden { display: none; }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #222; padding: 5px 10px; border-radius: 6px; }
        .row span { width: 25px; color: #1db954; font-weight: bold; }
        .row input { margin-bottom: 0; padding: 8px; border: none; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h2>🔒 Авторизация</h2>
        <input type="password" id="p" placeholder="Введите сложный пароль">
        <button onclick="auth()">Войти в систему</button>
    </div>

    <div id="editor" class="card hidden">
        <h2>🎵 Music Chart Editor</h2>
        <div id="list"></div>
        <button id="save" onclick="save()">Обновить чарт</button>
        <p id="msg" style="text-align:center; color: #888; margin-top:10px;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        const SB_URL = 'https://immwfduunwqqpkoszfeb.supabase.co';
        const SB_KEY = 'sb_publishable_IizaK7JwvJsaWv8x6qrLUg_OKWK7bqL';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // Хэш твоего пароля (сделаем его сейчас)
        // Если твой пароль "Admin_Radio_2026_!", то его хэш:
        const MASTER_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92"; 

        function auth() {
            const inputPass = document.getElementById('p').value;
            const inputHash = CryptoJS.SHA256(inputPass).toString();

            if(inputHash === MASTER_HASH) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('editor').classList.remove('hidden');
                load();
            } else { 
                alert('Доступ запрещен. Неверный пароль.'); 
            }
        }

        async function load() {
            const { data, error } = await _sb.from('music_chart').select('*').order('id', { ascending: true });
            if (error) { alert('Ошибка БД: ' + error.message); return; }
            
            document.getElementById('list').innerHTML = data.map(t => `
                <div class="row">
                    <span>${t.id}</span>
                    <input type="text" class="t-in" data-id="${t.id}" value="${t.track_name}">
                </div>
            `).join('');
        }

        async function save() {
            const btn = document.getElementById('save');
            const msg = document.getElementById('msg');
            btn.disabled = true;
            msg.innerText = "Синхронизация с базой...";

            const inputs = document.querySelectorAll('.t-in');
            for (let i of inputs) {
                await _sb.from('music_chart')
                         .update({ track_name: i.value })
                         .eq('id', i.getAttribute('data-id'));
            }

            btn.disabled = false;
            msg.innerText = "✅ Данные успешно обновлены!";
            setTimeout(() => { msg.innerText = ""; }, 3000);
        }
    </script>
</body>
</html>
